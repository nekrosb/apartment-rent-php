
services:
  postgres:
    image: postgres:16
    container_name: laravel_postgres
    restart: always

    environment:
      POSTGRES_DB: app
      POSTGRES_USER: UserRoot
      POSTGRES_PASSWORD: "password"

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: