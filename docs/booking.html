<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <title>Booking</title>
</head>

<body class="bg-light">

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm py-3">
        <div class="container">

            <a class="navbar-brand fw-bold" href="#">Apartment Rent</a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navMenu">

                <ul class="navbar-nav ms-auto">

                    <li class="nav-item">
                        <a class="nav-link" href="#">Home</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link active" href="#">Booking</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="#">Profile</a>
                    </li>

                </ul>

            </div>

        </div>
    </nav>

    <!-- Title -->
    <section class="container mt-4">

        <div class="bg-white rounded-4 shadow-sm p-4 text-center">

            <h2 class="fw-bold mb-1">Complete Your Booking</h2>
            <p class="text-muted mb-0">Fill in the details to confirm your reservation</p>

        </div>

    </section>

    <!-- Content -->
    <main class="container mt-4">

        <div class="row g-4">

            <!-- LEFT: FORM -->
            <div class="col-lg-8">

                <div class="card border-0 shadow-sm">
                    <div class="card-body">

                        <h5 class="fw-bold mb-3">Your Details</h5>

                        <div class="row g-3">

                            <div class="col-md-6">
                                <label class="form-label" for="first-name">First Name</label>
                                <input id="first-name" type="text" class="form-control" placeholder="John">
                            </div>

                            <div class="col-md-6">
                                <label class="form-label" for="last-name">Last Name</label>
                                <input id="last-name" type="text" class="form-control" placeholder="Doe">
                            </div>

                            <div class="col-md-6">
                                <label class="form-label">Email</label>
                                <input type="email" class="form-control" placeholder="john@example.com">
                            </div>

                            <div class="col-md-6">
                                <label class="form-label">Phone</label>
                                <input type="text" class="form-control" placeholder="+41 00 000 00 00">
                            </div>

                        </div>

                        <hr class="my-4">

                        <h5 class="fw-bold mb-3">Booking Details</h5>

                        <div class="row g-3">

                            <div class="col-md-6">
                                <label class="form-label">Move-in Date</label>
                                <input type="date" class="form-control">
                            </div>

                            <div class="col-md-6">
                                <label class="form-label">Duration</label>
                                <select class="form-select">
                                    <option>1 month</option>
                                    <option>3 months</option>
                                    <option>6 months</option>
                                    <option>1 year</option>
                                </select>
                            </div>

                        </div>

                        <hr class="my-4">

                        <h5 class="fw-bold mb-3">Additional Notes</h5>

                        <textarea class="form-control" rows="4" placeholder="Write any special requests..."></textarea>

                        <button class="btn btn-primary w-100 btn-lg mt-4">
                            Confirm Booking
                        </button>

                    </div>
                </div>

            </div>

            <!-- RIGHT: SUMMARY -->
            <div class="col-lg-4">

                <div class="card border-0 shadow-sm sticky-top" style="top: 20px;">

                    <img src="https://images.unsplash.com/photo-1505693416388-ac5ce068fe85?q=80&w=1200&auto=format&fit=crop"
                        class="card-img-top">

                    <div class="card-body">

                        <h5 class="fw-bold">Modern Apartment</h5>
                        <p class="text-muted mb-2">City Center • 2 rooms</p>

                        <h4 class="text-primary fw-bold">$1200 / month</h4>

                        <hr>

                        <p class="mb-1"><strong>Location:</strong> City Center</p>
                        <p class="mb-1"><strong>Size:</strong> 55 m²</p>
                        <p class="mb-3"><strong>Status:</strong> Available</p>

                        <button class="btn btn-outline-secondary w-100">
                            Back to Apartment
                        </button>

                    </div>

                </div>

            </div>

        </div>

    </main>

    <!-- Footer -->
    <footer class="bg-dark text-white text-center py-4 mt-5">
        <p class="mb-0">© 2026 Apartment Rent</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
